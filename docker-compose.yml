# Общая сеть для сервисов (в т.ч. одноразовых контейнеров `docker compose run`).
networks:
  marketplace:

services:
  db:
    image: postgres:16
    networks:
      - marketplace
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      # 5434 часто занят другим compose (например lab_03); хост-порт можно сменить при конфликте.
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
      - ./sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    networks:
      - marketplace
    depends_on:
      db:
        condition: service_healthy
    # Через опубликованный порт хоста: обходит сбои DNS имени `db` при `docker compose run` (WSL и т.п.).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5435/marketplace
    ports:
      - "8082:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    networks:
      - marketplace
    depends_on:
      - backend
    ports:
      - "5174:5173"
    environment:
      VITE_API_URL: http://backend:8080

volumes:
  postgres_data:
